<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bento Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="bento-grid container">
    <div class="bento-item hero-box">
        <span class="badge">● AVAILABLE FOR PROJECTS</span>
        <h1>Architecting Digital Experiences</h1>
        <p>Expert in Production-Level Clean Code & Modular Systems.</p>
    </div>

    <div class="bento-item services-box">
        <h3>Services</h3>
        <p style="color: white; font-size: 1.4rem;">Modern Web Apps & <br> Clean System Architecture</p>
    </div>

    <div class="bento-item tech-box">
        <h3>Stack</h3>
        <ul class="tech-list">
            <li>HTML5</li>
            <li>CSS3</li>
            <li>JavaScript</li>
            <li>Git</li>
        </ul>
    </div>

    <div class="bento-item action-box">
        <h3>Let's Build</h3>
        <button class="btn-main">Get in Touch</button>
    </div>
</main>
</body>
</html>
